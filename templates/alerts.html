<!DOCTYPE html>
<!--
  alerts.html — LanSentry Alert Log
  ════════════════════════════════════════════════════════════════
  No Jinja2. Alert rows are built by JavaScript after the page loads,
  using data from GET /api/alerts.

  Features:
    • Severity colour-coding (info / warning / critical)
    • Dismiss single alert   → POST /api/alerts/<id>/read
    • Dismiss all alerts     → POST /api/alerts/read-all
    • Auto-refresh every 30 seconds
    • Unread / All toggle filter
  ════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alerts — LanSentry</title>
  <link rel="stylesheet" href="/static/style.css" />

  <style>
    /* ── Severity colour helpers ── */
    .sev-info     { border-left: 3px solid var(--accent);   }
    .sev-warning  { border-left: 3px solid var(--warning);  }
    .sev-critical { border-left: 3px solid var(--danger);   }

    .sev-icon-info     { background: rgba(0,212,255,0.1);  }
    .sev-icon-warning  { background: var(--warning-bg);    }
    .sev-icon-critical { background: var(--danger-bg);     }

    /* Dismiss button — small, sits to the right of each alert */
    .btn-dismiss {
      flex-shrink:   0;
      padding:       5px 10px;
      font-size:     11px;
      background:    var(--bg-secondary);
      color:         var(--text-muted);
      border:        1px solid var(--border);
      border-radius: 6px;
      cursor:        pointer;
      transition:    var(--transition);
      font-family:   inherit;
    }
    .btn-dismiss:hover {
      color:         var(--text-primary);
      border-color:  var(--text-muted);
    }

    /* Filter toggle pills */
    .filter-pills {
      display:    flex;
      gap:        8px;
      flex-wrap:  wrap;
    }
    .pill {
      padding:       5px 14px;
      border-radius: 20px;
      font-size:     12px;
      font-weight:   700;
      cursor:        pointer;
      border:        1px solid var(--border);
      background:    var(--bg-secondary);
      color:         var(--text-secondary);
      transition:    var(--transition);
    }
    .pill.active {
      background:   rgba(0,212,255,0.12);
      color:        var(--accent);
      border-color: rgba(0,212,255,0.3);
    }
    .alert-meta {
      font-size:   11px;
      color:       var(--text-muted);
      font-family: 'Space Mono', monospace;
      margin-top:  4px;
    }
  </style>
</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="navbar">
    <a class="navbar-brand" href="/">
      <div class="logo-icon">🛡️</div>
      <h1>Lan<span>Sentry</span></h1>
    </a>
    <ul class="nav-links">
      <li><a href="/"        id="nav-home">🏠 Home</a></li>
      <li><a href="/devices" id="nav-devices">📡 Devices</a></li>
      <li><a href="/alerts"  id="nav-alerts">
        🚨 Alerts
        <span class="alert-badge" id="alert-badge" style="display:none">0</span>
      </a></li>
    </ul>
    <div class="nav-right">
      <div class="network-status">
        <div class="status-dot"></div>
        <span>Network Active</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        <div class="toggle-knob" id="toggle-knob">🌙</div>
      </button>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="mobile-nav" id="mobile-nav">
    <a href="/">🏠 Home</a>
    <a href="/devices">📡 Devices</a>
    <a href="/alerts">🚨 Alerts</a>
  </div>

  <!-- ── MAIN CONTENT ── -->
  <div class="container">

    <div class="page-header">
      <div class="breadcrumb">LanSentry / <span>Alerts</span></div>
      <h2>Alert Log</h2>
      <p>Security events and network activity detected by the scanner</p>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">
          <div class="dot" style="background:var(--danger);box-shadow:0 0 8px var(--danger);"></div>
          Security Alerts
        </div>
        <div class="panel-actions">
          <!-- Filter pills -->
          <div class="filter-pills">
            <button class="pill active" id="pill-all"    onclick="setFilter('all')">All</button>
            <button class="pill"        id="pill-unread" onclick="setFilter('unread')">Unread</button>
          </div>
          <button class="btn btn-ghost" onclick="dismissAll()">🗑️ Dismiss All</button>
        </div>
      </div>

      <!-- Alert rows injected here by renderAlerts() -->
      <div id="alerts-container">
        <div class="no-alerts">
          <div class="shield">⏳</div>
          <h3>Loading…</h3>
          <p>Fetching alert data from the server.</p>
        </div>
      </div>

      <div class="panel-footer">
        <div class="update-info">
          <div class="live-dot"></div>
          <span id="alerts-updated">Monitoring active</span>
        </div>
        <span class="next-scan">Auto-refreshes every 30s</span>
      </div>
    </div>

  </div><!-- /container -->

  <div class="toast-container" id="toast-container"></div>

  <!-- ── JAVASCRIPT ── -->
  <script>
  // ── Global utilities ──────────────────────────────────────────────────────

  (function() {
    if (localStorage.getItem("lansentry-theme") === "light")
      document.body.classList.add("light-mode");
  })();

  function toggleTheme() {
    document.body.classList.toggle("light-mode");
    const isLight = document.body.classList.contains("light-mode");
    document.getElementById("toggle-knob").textContent = isLight ? "☀️" : "🌙";
    localStorage.setItem("lansentry-theme", isLight ? "light" : "dark");
  }

  function escapeHTML(str) {
    if (str == null) return "";
    const el = document.createElement("div");
    el.textContent = String(str);
    return el.innerHTML;
  }

  function showToast(msg, type = "info", duration = 3500) {
    const icons = { success:"✅", error:"❌", info:"ℹ️", warning:"⚠️" };
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type]||"ℹ️"}</span><span>${escapeHTML(msg)}</span>`;
    document.getElementById("toast-container").appendChild(toast);
    setTimeout(() => {
      toast.style.animation = "toastOut 0.3s ease forwards";
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  function updateAlertBadge() {
    fetch("/api/alerts/unread-count")
      .then(r => r.json())
      .then(data => {
        const badge = document.getElementById("alert-badge");
        if (data.count > 0) {
          badge.textContent   = data.count;
          badge.style.display = "inline";
        } else {
          badge.style.display = "none";
        }
      }).catch(() => {});
  }

  // ── Page state ────────────────────────────────────────────────────────────

  let currentFilter = "all";   // "all" or "unread"

  function setFilter(f) {
    currentFilter = f;
    document.getElementById("pill-all").classList.toggle("active",    f === "all");
    document.getElementById("pill-unread").classList.toggle("active", f === "unread");
    loadAlerts();
  }

  // ── Severity helpers ──────────────────────────────────────────────────────

  const SEV_ICON = {
    info:     "ℹ️",
    warning:  "⚠️",
    critical: "🚨",
  };

  const TYPE_LABEL = {
    new_device:      "New Device",
    device_offline:  "Device Offline",
    blocked_attempt: "Blocked Attempt",
    high_risk:       "High Risk",
    port_change:     "Port Change",
  };

  // ── Render alerts ─────────────────────────────────────────────────────────

  function renderAlerts(alerts) {
    const container = document.getElementById("alerts-container");

    if (alerts.length === 0) {
      container.innerHTML = `
        <div class="no-alerts">
          <div class="shield">🛡️</div>
          <h3>All Clear!</h3>
          <p>No alerts to show for the current filter.<br>Your network looks clean.</p>
        </div>`;
      return;
    }

    container.innerHTML = alerts.map(a => {
      // Format the timestamp into a human-readable relative time
      let timeLabel = "";
      if (a.alert_time) {
        const diff = Math.round((Date.now() - new Date(a.alert_time)) / 1000);
        timeLabel = diff < 60   ? `${diff}s ago`
                  : diff < 3600 ? `${Math.round(diff/60)}m ago`
                  : diff < 86400? `${Math.round(diff/3600)}h ago`
                  : new Date(a.alert_time).toLocaleDateString();
      }

      const sev      = a.severity || "info";
      const icon     = SEV_ICON[sev]  || "ℹ️";
      const typeLabel = TYPE_LABEL[a.alert_type] || escapeHTML(a.alert_type);

      // is_read=0 means unread — bold styling via font-weight
      const unreadStyle = a.is_read ? "" : "font-weight:700;";

      return `
        <div class="alert-item sev-${escapeHTML(sev)}" id="alert-row-${a.id}">
          <div class="alert-icon-wrap sev-icon-${escapeHTML(sev)}">${icon}</div>
          <div class="alert-content" style="flex:1; ${unreadStyle}">
            <div class="alert-title">${escapeHTML(typeLabel)}</div>
            <div class="alert-detail">${escapeHTML(a.message)}</div>
            <div class="alert-meta">
              ${escapeHTML(a.device_ip || "")}
              ${a.device_ip && a.device_name ? " · " : ""}
              ${escapeHTML(a.device_name || "")}
              ${timeLabel ? " · " + escapeHTML(timeLabel) : ""}
            </div>
          </div>
          <button class="btn-dismiss"
                  data-id="${a.id}"
                  onclick="dismissOne(this)"
                  ${a.is_read ? 'style="opacity:0.4"' : ""}>
            ${a.is_read ? "✓" : "Dismiss"}
          </button>
        </div>`;
    }).join("");
  }

  // ── API calls ─────────────────────────────────────────────────────────────

  async function loadAlerts() {
    try {
      const unreadOnly = currentFilter === "unread" ? "true" : "false";
      const data = await fetch(`/api/alerts?limit=200&unread_only=${unreadOnly}`)
                          .then(r => r.json());

      renderAlerts(data.alerts || []);

      document.getElementById("alerts-updated").textContent =
        `Last checked: ${new Date().toLocaleTimeString()} · ${data.count} alert(s)`;

      // Refresh badge since we may have changed read state
      updateAlertBadge();
    } catch(e) {
      showToast("Failed to load alerts.", "error");
    }
  }

  async function dismissOne(btn) {
    const id = btn.dataset.id;
    try {
      await fetch(`/api/alerts/${id}/read`, { method: "POST" });
      // Fade out and remove the row
      const row = document.getElementById(`alert-row-${id}`);
      if (row) {
        row.style.transition = "opacity 0.3s";
        row.style.opacity    = "0";
        setTimeout(() => row.remove(), 300);
      }
      updateAlertBadge();
    } catch(e) {
      showToast("Could not dismiss alert.", "error");
    }
  }

  async function dismissAll() {
    if (!confirm("Mark all alerts as read?")) return;
    try {
      const data = await fetch("/api/alerts/read-all", { method:"POST" }).then(r=>r.json());
      showToast(`Dismissed ${data.cleared} alert(s)`, "success");
      loadAlerts();
    } catch(e) {
      showToast("Failed to dismiss alerts.", "error");
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  document.addEventListener("DOMContentLoaded", () => {
    if (document.body.classList.contains("light-mode"))
      document.getElementById("toggle-knob").textContent = "☀️";

    document.getElementById("nav-alerts").classList.add("active");

    document.getElementById("hamburger").addEventListener("click", () =>
      document.getElementById("mobile-nav").classList.toggle("open")
    );

    updateAlertBadge();
    setInterval(updateAlertBadge, 30_000);

    loadAlerts();
    setInterval(loadAlerts, 30_000);
  });
  </script>

</body>
</html>
