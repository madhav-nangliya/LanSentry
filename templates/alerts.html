{% extends "base.html" %}

{% block title %}Alerts — LanSentry{% endblock %}

{% block content %}
<!--
  alerts.html — LanSentry Alert Log
  ===================================
  Shows all security events from the MySQL 'alerts' table.

  DATA FLOW:
  1. Flask renders the HTML shell (no alert data passed from server)
  2. loadAlerts() fetches GET /api/alerts on page load
  3. Renders each alert using renderAlerts()
  4. Polls every 30 seconds to pick up new events
  5. Dismiss / Clear All mark alerts as read via POST endpoints

  WHY IS DATA LOADED VIA JS AND NOT JINJA2?
  → We want the page to update live without full reload.
    Also, the old Jinja2 approach used wrong field names (alert.ip instead
    of alert.device_ip) which caused template errors. The JS approach is
    cleaner and consistent with the rest of the app.

  SCHEMA REMINDER — each alert object from the API has:
    id, alert_time, alert_type, device_mac, device_ip, device_name,
    message, severity ('info'|'warning'|'critical'), is_read
-->

<div class="page-header">
  <div>
    <div class="breadcrumb">LanSentry / <span>Alerts</span></div>
    <h2>Alert Log</h2>
    <p>Security events detected on your network</p>
  </div>
  <div class="header-actions">
    <!-- Severity filter chips -->
    <div class="filter-chips">
      <button class="chip chip-active" data-sev="all"      onclick="setSeverityFilter('all')">All</button>
      <button class="chip chip-danger" data-sev="critical" onclick="setSeverityFilter('critical')">🔴 Critical</button>
      <button class="chip chip-warn"   data-sev="warning"  onclick="setSeverityFilter('warning')">🟡 Warning</button>
      <button class="chip"             data-sev="info"     onclick="setSeverityFilter('info')">🔵 Info</button>
    </div>
  </div>
</div>

<!-- Main panel -->
<div class="panel">

  <div class="panel-header">
    <div class="panel-title">
      <div class="dot" style="background:var(--danger); box-shadow:0 0 8px var(--danger);"></div>
      Security Events
      <span class="count-badge" id="alert-total-badge">–</span>
    </div>
    <div class="panel-actions">
      <!--
        "Mark All Read" — calls POST /api/alerts/read-all.
        This persists to the DB so the badge count drops on every page.
        The old clearAlerts() only cleared the DOM — reloading the page
        showed everything again. This fix ensures it's persistent.
      -->
      <button class="btn btn-ghost" id="mark-all-btn" onclick="markAllRead()">
        ✔ Mark All Read
      </button>
    </div>
  </div>

  <!-- Alert list — populated by renderAlerts() -->
  <div id="alerts-container" role="log" aria-live="polite" aria-label="Alert log">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <p>Loading alerts…</p>
    </div>
  </div>

  <div class="panel-footer">
    <div class="update-info">
      <div class="live-dot"></div>
      <span id="alerts-updated">Monitoring active</span>
    </div>
    <span class="next-scan">Auto-refreshes every 30s</span>
  </div>

</div>
{% endblock %}


{% block scripts %}
<script>
// ═══════════════════════════════════════════════════════════════════════
// alerts.js — Alert log logic
// ═══════════════════════════════════════════════════════════════════════

let allAlerts     = [];
let severityFilter = 'all';


// ── SEVERITY FILTER ──────────────────────────────────────────────────────

function setSeverityFilter(sev) {
  severityFilter = sev;
  document.querySelectorAll('[data-sev]').forEach(chip => {
    chip.classList.toggle('chip-active', chip.dataset.sev === sev);
  });
  renderAlerts(getFilteredAlerts());
}

function getFilteredAlerts() {
  if (severityFilter === 'all') return allAlerts;
  return allAlerts.filter(a => a.severity === severityFilter);
}


// ── ICON MAP ─────────────────────────────────────────────────────────────

const ALERT_ICONS = {
  new_device:      '🆕',
  device_offline:  '📴',
  blocked_attempt: '🚫',
  high_risk:       '⚠️',
  port_change:     '🔌',
};

const SEVERITY_LABEL = {
  critical: ['severity-critical', '🔴 Critical'],
  warning:  ['severity-warning',  '🟡 Warning'],
  info:     ['severity-info',     '🔵 Info'],
};


// ── RENDER ALERTS ────────────────────────────────────────────────────────

/**
 * renderAlerts(alerts) — builds the alert list HTML.
 *
 * Each alert row shows:
 *  • Icon (based on alert_type)
 *  • Title + message
 *  • Device IP and MAC
 *  • Severity badge
 *  • Time (relative)
 *  • Dismiss button (marks as read in DB)
 *
 * SECURITY: escapeHTML() on all dynamic data before innerHTML.
 */
function renderAlerts(alerts) {
  const container = document.getElementById('alerts-container');
  document.getElementById('alert-total-badge').textContent = allAlerts.length;

  if (!alerts || alerts.length === 0) {
    container.innerHTML = `
      <div class="no-alerts">
        <div class="shield">🛡️</div>
        <h3>All Clear!</h3>
        <p>No alerts match your current filter.<br>Your network looks clean.</p>
      </div>`;
    return;
  }

  container.innerHTML = alerts.map(alert => {
    const icon     = ALERT_ICONS[alert.alert_type] || '🔔';
    const [sevCls, sevLabel] = SEVERITY_LABEL[alert.severity] || ['severity-info', '🔵 Info'];
    const readCls  = alert.is_read ? 'alert-item alert-read' : 'alert-item';

    // Sanitise all user-originated fields
    const msgHtml    = escapeHTML(alert.message     || '');
    const nameHtml   = escapeHTML(alert.device_name || 'Unknown');
    const ipHtml     = escapeHTML(alert.device_ip   || '');
    const macHtml    = escapeHTML(alert.device_mac  || '');
    const timeStr    = timeAgo(alert.alert_time);
    const typeLabel  = escapeHTML((alert.alert_type || '').replace(/_/g, ' '));

    return `
      <div class="${readCls}" id="alert-${alert.id}" data-id="${alert.id}">
        <div class="alert-icon-wrap ${sevCls}-bg">${icon}</div>
        <div class="alert-content">
          <div class="alert-title">
            ${nameHtml}
            <span class="alert-type-label">${typeLabel}</span>
          </div>
          <div class="alert-message">${msgHtml}</div>
          <div class="alert-meta">
            ${ipHtml  ? `<span class="meta-pill">📍 ${ipHtml}</span>`  : ''}
            ${macHtml ? `<span class="meta-pill">🔌 ${macHtml}</span>` : ''}
          </div>
        </div>
        <div class="alert-right">
          <span class="badge ${sevCls}">${sevLabel}</span>
          <span class="alert-time">${timeStr}</span>
          ${!alert.is_read ? `
            <button class="btn btn-ghost btn-xs"
              onclick="dismissAlert(${alert.id})"
              aria-label="Dismiss alert">
              ✔ Dismiss
            </button>` : ''}
        </div>
      </div>`;
  }).join('');
}


// ── DISMISS SINGLE ALERT ─────────────────────────────────────────────────

/**
 * dismissAlert(id) — marks one alert as read via POST /api/alerts/<id>/read
 *
 * WHY POST?
 * → Same reason as block: this changes state. GET requests should be
 *   read-only. A POST with a specific resource ID is also idempotent —
 *   marking an already-read alert as read does nothing harmful.
 */
async function dismissAlert(alertId) {
  try {
    const res  = await fetch(`/api/alerts/${alertId}/read`, { method: 'POST' });
    const data = await res.json();

    if (data.success) {
      // Visually mark the row as read without re-fetching everything
      const row = document.getElementById(`alert-${alertId}`);
      if (row) {
        row.classList.add('alert-read');
        row.querySelector('.btn-xs')?.remove();   // Remove dismiss button
      }

      // Update the local array so filter re-renders are consistent
      const idx = allAlerts.findIndex(a => a.id === alertId);
      if (idx !== -1) allAlerts[idx].is_read = 1;

      showToast('Alert dismissed', 'success', 1500);
    }
  } catch {
    showToast('Failed to dismiss alert', 'error');
  }
}


// ── MARK ALL READ ────────────────────────────────────────────────────────

/**
 * markAllRead() — calls POST /api/alerts/read-all.
 * Persists to DB so the navbar badge count drops to 0.
 * The old DOM-only clearAlerts() was misleading — data came back on reload.
 */
async function markAllRead() {
  const btn = document.getElementById('mark-all-btn');
  btn.disabled  = true;
  btn.textContent = '⏳ Clearing…';

  try {
    const res  = await fetch('/api/alerts/read-all', { method: 'POST' });
    const data = await res.json();

    if (data.success) {
      showToast(`${data.cleared} alert(s) marked as read`, 'success');
      allAlerts.forEach(a => a.is_read = 1);   // Update local state
      renderAlerts(getFilteredAlerts());
    } else {
      showToast('Failed to clear alerts', 'error');
    }
  } catch {
    showToast('Network error', 'error');
  } finally {
    btn.disabled    = false;
    btn.textContent = '✔ Mark All Read';
  }
}


// ── FETCH ALERTS ─────────────────────────────────────────────────────────

/**
 * loadAlerts() — GET /api/alerts?limit=200
 * Fetches and renders the alert list.
 */
async function loadAlerts() {
  try {
    const res  = await fetch('/api/alerts?limit=200');
    const data = await res.json();

    if (!data.success) throw new Error(data.message);

    allAlerts = data.alerts;

    renderAlerts(getFilteredAlerts());

    const now = new Date();
    document.getElementById('alerts-updated').textContent =
      'Last checked: ' + now.toLocaleTimeString();

  } catch (err) {
    document.getElementById('alerts-container').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">❌</div>
        <p>Failed to load alerts. Is the server running?</p>
      </div>`;
    console.error('loadAlerts error:', err);
  }
}

// ── timeAgo helper (same as devices.html — ideally this would be in a shared JS file)
function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const diff = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (diff < 5)    return 'just now';
  if (diff < 60)   return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
  if (diff < 86400)return `${Math.floor(diff / 3600)}h ago`;
  return `${Math.floor(diff / 86400)}d ago`;
}


// ── INIT ─────────────────────────────────────────────────────────────────

loadAlerts();
setInterval(loadAlerts, 30000);   // Auto-refresh every 30 seconds
</script>
{% endblock %}
